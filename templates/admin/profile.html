<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Profile</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

body{
margin:0;
font-family:Segoe UI,sans-serif;
background:#f4f7fc;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:250px;
height:100%;
background:#111827;
padding-top:20px;
}

.sidebar a{
display:block;
color:white;
padding:15px 20px;
text-decoration:none;
}

.sidebar a:hover{
background:#2563eb;
}

.main{
margin-left:250px;
padding:30px;
}

.profile-card{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
text-align:center;
}

.profile-card img{
width:150px;
height:150px;
border-radius:50%;
border:5px solid #2563eb;
}

.profile-card h2{
margin-top:15px;
}

.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:30px;
}

.stat{
background:white;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.stat h1{
color:#2563eb;
}

</style>
</head>

<body>

<div class="sidebar">
<a href="/admin/dashboard">📊 Dashboard</a>
<a href="/admin/add_product">➕ Add Product</a>
<a href="/admin/orders">📦 Orders</a>
<a href="/admin/customers">👥 Customers</a>
<a href="/admin/analytics">📈 Analytics</a>
<a href="/admin/profile">👤 Profile</a>
</div>

<div class="main">

<div class="profile-card">

<img src="https://i.pravatar.cc/300">

<h2>{{ admin_name }}</h2>

<p>Super Administrator</p>

<p>admin@stepstyle.com</p>

</div>

<div class="stats">

<div class="stat">
<h1>{{ products }}</h1>
<p>Total Products</p>
</div>

<div class="stat">
<h1>{{ users }}</h1>
<p>Total Users</p>
</div>

<div class="stat">
<h1>{{ orders }}</h1>
<p>Total Orders</p>
</div>

</div>

</div>

</body>
</html>
