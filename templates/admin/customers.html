<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Customers</title>

<style>

body{
margin:0;
font-family:Segoe UI,sans-serif;
background:#f4f7fc;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:250px;
height:100%;
background:#111827;
padding-top:20px;
}

.sidebar a{
display:block;
padding:15px;
color:white;
text-decoration:none;
}

.sidebar a:hover{
background:#2563eb;
}

.main{
margin-left:250px;
padding:30px;
}

h1{
margin-bottom:20px;
}

table{
width:100%;
background:white;
border-collapse:collapse;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

th{
background:#2563eb;
color:white;
padding:15px;
}

td{
padding:15px;
border-bottom:1px solid #eee;
}

</style>
</head>

<body>

<div class="sidebar">
<a href="/admin/dashboard">📊 Dashboard</a>
<a href="/admin/add_product">➕ Add Product</a>
<a href="/admin/orders">📦 Orders</a>
<a href="/admin/customers">👥 Customers</a>
<a href="/admin/analytics">📈 Analytics</a>
<a href="/admin/profile">👤 Profile</a>
</div>

<div class="main">

<h1>Customer Management</h1>

<table>

<tr>
<th>Name</th>
<th>Email</th>
</tr>

{% for user in users %}

<tr>
<td>{{ user.name }}</td>
<td>{{ user.email }}</td>
</tr>

{% endfor %}

</table>

</div>

</body>
</html>
