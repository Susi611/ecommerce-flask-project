<!DOCTYPE html>
<html>
<head>
    <title>My Orders</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

<style>

.order-card{
    background:white;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
    box-shadow:0 4px 10px rgba(0,0,0,.1);
}

.product-box{
    display:flex;
    align-items:center;
    gap:20px;
    margin-top:15px;
    padding:10px;
    border-top:1px solid #eee;
}

.product-box img{
    width:100px;
    height:100px;
    object-fit:cover;
    border-radius:10px;
}

.status{
    display:inline-block;
    padding:8px 15px;
    border-radius:20px;
    color:white;
}

.pending{
    background:orange;
}

.accepted{
    background:green;
}

.rejected{
    background:red;
}

</style>

</head>

<body>

<div class="navbar">
    <div class="logo">E-Shop</div>

    <div class="nav-links">
        <a href="/products">Products</a>
        <a href="/cart">Cart</a>
        <a href="/logout">Logout</a>
    </div>
</div>

<div class="container">

<h2>My Orders</h2>

{% for order in orders %}

<div class="order-card">

    <h3>Order ID</h3>
    <p>{{ order._id }}</p>

    <h3>Status</h3>

    <span class="status
        {% if order.status == 'Accepted' %}
            accepted
        {% elif order.status == 'Rejected' %}
            rejected
        {% else %}
            pending
        {% endif %}
    ">
        {{ order.status }}
    </span>

    <h3 style="margin-top:20px;">Products</h3>

    {% for product in order.product_details %}

    <div class="product-box">

        <img src="{{ product.image }}" alt="Product">

        <div>
            <h4>{{ product.name }}</h4>
            <p>₹{{ product.price }}</p>
        </div>

    </div>

    {% endfor %}

</div>

{% endfor %}

</div>

</body>
</html>
