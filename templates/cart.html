<!DOCTYPE html>
<html>
<head>
    <title>Cart</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="navbar">
    <div class="logo">E-Shop</div>

    <div class="nav-links">
        <a href="/products">Products</a>
        <a href="/orders">Orders</a>
        <a href="/logout">Logout</a>
    </div>
</div>

<div class="container">

    <h2>Your Cart</h2>

    {% for item in items %}

    <div class="cart-item">

        <div>
            <h3>{{ item.name }}</h3>
            <p>₹{{ item.price }}</p>
        </div>

        <a href="/remove_cart/{{ item._id }}" class="btn">
            Remove
        </a>

    </div>

    {% endfor %}

    <a href="/place_order" class="btn">
        Place Order
    </a>

</div>

</body>
</html>
